version: '3.8'

services:
  # 1. Database PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: bayaran_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: adminDbPasswordSecure2026
      POSTGRES_DB: bayaran_madrasah
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: bayaran_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 3. Backend App (Elysia + Bun)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bayaran_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:adminDbPasswordSecure2026@postgres:5432/bayaran_madrasah
      REDIS_URL: redis://redis:6379
      JWT_SECRET: super-secret-key-madrasah-2026-bun
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
